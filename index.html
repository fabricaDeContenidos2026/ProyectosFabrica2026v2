
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos Interactivos | CUN</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
   
</head>
<body>

<header>
    <img src="img/logo.png" alt="Logo CUN" />
    <div class="header-links">
        <a href="https://carnet.cun.edu.co/#/inicio" target="_blank"><i class="fa-solid fa-id-card"></i> Estudiantes</a>
        <a href="https://carnet.cun.edu.co/#/inicio" target="_blank"><i class="fa-solid fa-people-group"></i> Colaboradores</a>
    </div>
</header>

<div class="proyectos-container">
    <button class="btn-open" onclick="abrirModal()">📂 Biblioteca de Proyectos</button>
</div>

<div id="modalProyectos" class="modal">
    <div class="modal-content">
        <span onclick="cerrarModal()" style="float:right; cursor:pointer; color:#ff4b4b; font-size:24px;">&times;</span>
        <h2 style="text-align:center;">BIBLIOTECA</h2>
        
        <span class="categoria-label">Contenido Principal</span>
        <div id="listaProyectos"></div>

        <span class="categoria-label">Productos Educativos</span>
        <div class="proyecto-item" onclick="cargarUrl('https://online.fliphtml5.com/dkmsl/rrpw/', 'Revista')">
            <i class="fa-solid fa-book-open"></i> Revista Diseño Gráfico
        </div>
        <div class="proyecto-item sub-item" onclick="cargarUrl('https://online.fliphtml5.com/dkmsl/cvjz/', 'Glosario')">
            <i class="fa-solid fa-circle-info"></i> Glosario
        </div>
        <div class="proyecto-item sub-item" onclick="cargarUrl('https://embed.figma.com/proto/RueRB8Bfa0kQbWJWDuuHXT/Sin-t%C3%ADtulo?node-id=1-2&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&embed-host=share', 'Fichas')">
            <i class="fa-solid fa-file-invoice"></i> Fichas
        </div>
    </div>
</div>

<div class="iframe-container" id="mainContainer">
    <div id="welcome-overlay">
        <img src="img/logo.png" class="static-logo" alt="CUN">
        <div class="text-hint">Selecciona un proyecto para comenzar</div>
    </div>

    <div id="loader-overlay">
        <img src="img/logo.png" class="loader-logo" alt="Cargando">
        <div class="text-hint">Cargando experiencia...</div>
    </div>

    <iframe id="visorFrame" src="" allowfullscreen="true"></iframe>
</div>

<footer>
    <p style="font-size: 11px; opacity: 0.5;">&copy; 2026 CORPORACIÓN UNIFICADA NACIONAL DE EDUCACIÓN SUPERIOR</p>
</footer>

<script>
const proyectos = [
    { nombre: "Fábrica de Contenido", url: "https://view.genially.com/6970da8da2ef09cea89fb3a8" },
    { nombre: "CPlay", url: "https://embed.figma.com/proto/jFyBWV98C4BeH5V0mRnrZN/CPLAY---Archivo-parcial-guardado-6-3-2026?node-id=18-2&scaling=contain&content-scaling=fixed&page-id=0%3A1&embed-host=share" },
    { nombre: "Bitácora", url: "https://view.genially.com/6972328f0508658631ae9ff3" },
    { nombre: "Prácticas", url: "https://view.genially.com/697bd198faf51c6b1c542400/interactive-content" },
    { nombre: "Interfax CUN-ULIM", url: "https://interfax-cun-ulim.vercel.app/" },
    { nombre: "Saber PRO (DOJO)", url: "https://embed.figma.com/proto/qgRPheoib7P5QQa90gje5S/Dojo-TyT?page-id=0%3A1&node-id=1-265&viewport=1764%2C569%2C0.25&scaling=scale-down&content-scaling=fixed&embed-host=share" }
];

const lista = document.getElementById("listaProyectos");
const visor = document.getElementById("visorFrame");
const loader = document.getElementById("loader-overlay");
const welcome = document.getElementById("welcome-overlay");
const container = document.getElementById("mainContainer");

// Cargar la lista dinámicamente
proyectos.forEach((p) => {
    const item = document.createElement("div");
    item.className = "proyecto-item";
    item.innerHTML = `<i class="fa-solid fa-folder-open" style="color:#84BD00;"></i> ${p.nombre}`;
    item.onclick = () => cargarUrl(p.url, p.nombre);
    lista.appendChild(item);
});

function cargarUrl(url, nombre) {
    cerrarModal();
    welcome.style.display = "none";
    loader.style.display = "flex";
    visor.style.opacity = "0";

    // Ajuste de tamaño específico
    if (nombre === "CPlay") {
        container.style.aspectRatio = "16 / 10"; // Figma suele necesitar un poco más de alto
    } else {
        container.style.aspectRatio = "16 / 9";
    }

    // Tiempo de carga simulado para efectos visuales
    setTimeout(() => {
        visor.src = url;
        visor.onload = () => {
            loader.style.display = "none";
            visor.style.opacity = "1";
        };
    }, 1500); 
}

function abrirModal() { document.getElementById("modalProyectos").style.display = "flex"; }
function cerrarModal() { document.getElementById("modalProyectos").style.display = "none"; }

// Cerrar al hacer clic fuera del modal
window.onclick = (e) => {
    const modal = document.getElementById("modalProyectos");
    if (e.target === modal) cerrarModal();
};
</script>

</body>
</html>
